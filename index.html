<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Multiplication usig functio</h1>
    <p id="mul"></p>
    <script>
        function Multiply(a,b){
            return a*b
        }
        var num1 = 10;
        var num2 = 10;
        
        var answer = Multiply(num1,num2);

        document.getElementById("mul").innerHTML = "Answer: " + answer;
    </script>
    
</body>
</html>
